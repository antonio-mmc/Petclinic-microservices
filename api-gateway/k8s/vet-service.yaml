apiVersion: apps/v1
kind: Deployment
metadata:
  name: vet-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vet-service
  template:
    metadata:
      labels:
        app: vet-service
    spec:
      containers:
        - name: vet-service
          image: grupo1/vet-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: OTEL_SERVICE_NAME
              value: "vet-service"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4318"
---
apiVersion: v1
kind: Service
metadata:
  name: vet-service
spec:
  selector:
    app: vet-service
  ports:
    - port: 8081
      targetPort: 8081
