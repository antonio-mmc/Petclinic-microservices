spring:
  application:
    name: visit-service
  datasource:
    url: jdbc:h2:mem:visitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

  # RabbitMQ connection (overridden in Docker via SPRING_RABBITMQ_HOST env var)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    # Spring Cloud Stream — async consumer for PetDeactivatedEvent
    function:
      definition: petEvents
    stream:
      default-binder: rabbit
      bindings:
        petEvents-in-0:
          destination: pet-events
          content-type: application/json
          group: visit-service
      rabbit:
        bindings:
          petEvents-in-0:
            consumer:
              binding-routing-key: pet.deactivated
              auto-bind-dlq: false
    discovery:
      simple:
        instances:
          customer-service:
            - uri: http://localhost:8080

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  health:
    rabbit:
      enabled: false   # Prevents startup failure when RabbitMQ is not available locally
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      petService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        ignoreExceptions:
          - org.springframework.samples.petclinic.visit.client.InactivePetException
          - org.springframework.samples.petclinic.visit.client.PetValidationException
  timelimiter:
    instances:
      petService:
        timeoutDuration: 2s # Chaos: strict timeout to force failures

app:
  customer-service:
    url: http://localhost:8080

logging:
  level:
    org.springframework.samples.petclinic.visit: DEBUG
    io.github.resilience4j: DEBUG
